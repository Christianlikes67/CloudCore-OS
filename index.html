<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudCore OS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:white;
    background:#0f172a;
}

/* BACKGROUND */
.bg{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:800px;
    max-width:85vw;
    opacity:0.06;
    pointer-events:none;
    z-index:-1;
}

/* TOPBAR */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:42px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 14px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
    font-family:"Pacifico",cursive;
    font-size:22px;
}

.clock{
    font-size:13px;
    color:#cbd5e1;
}

/* DESKTOP */
.desktop{
    padding-top:70px;
    padding-left:20px;
    display:flex;
    gap:20px;
}

/* ICON */
.icon{
    width:90px;
    text-align:center;
    cursor:pointer;
    padding:10px;
    border-radius:12px;
}

.icon:hover{
    background:rgba(255,255,255,0.08);
}

.icon img{
    width:64px;
    height:64px;
    border-radius:14px;
}

.icon p{
    font-size:13px;
    margin-top:5px;
}

/* WINDOW */
.window{
    position:absolute;
    top:120px;
    left:200px;
    width:800px;
    max-width:90%;
    background:rgba(15,23,42,0.95);
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.15);
    display:none;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    background:rgba(0,0,0,0.25);
    cursor:grab;
}

.close{
    width:26px;
    height:26px;
    border:none;
    border-radius:50%;
    background:#ef4444;
    color:white;
    cursor:pointer;
}

/* APP CONTENT */
.content{
    padding:20px;
}

/* TITLE */
.title{
    font-family:"Pacifico",cursive;
    font-size:28px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<!-- BACKGROUND LOGO -->
<img class="bg" src="https://i.postimg.cc/LYX21zNC/Cloud-Core.png">

<!-- TOPBAR -->
<div class="topbar">
    <div class="logo">CloudCore OS</div>
    <div class="clock" id="clock"></div>
</div>

<!-- DESKTOP -->
<div class="desktop">

    <div class="icon" onclick="openApp('journal')">
        <img src="https://i.postimg.cc/LYX21zNC/Cloud-Core.png">
        <p>Journal</p>
    </div>

</div>

<!-- JOURNAL APP -->
<div class="window" id="journal">

    <div class="header" id="drag">
        <span>CloudCore Journal</span>
        <button class="close" onclick="closeApp('journal')">×</button>
    </div>

    <div class="content" id="content">
        <div class="title">Welcome</div>
        Click Journal posts on the left (demo simplified).
    </div>

</div>

<script>

/* CLOCK */
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleDateString() + " " + now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

/* OPEN / CLOSE APP */
function openApp(id){
    document.getElementById(id).style.display = "block";
}

function closeApp(id){
    document.getElementById(id).style.display = "none";
}

/* DRAG WINDOW (simple but stable) */
let win = document.getElementById("journal");
let drag = false;
let offsetX, offsetY;

document.getElementById("drag").onmousedown = (e)=>{
    drag = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
}

document.onmousemove = (e)=>{
    if(drag){
        win.style.left = (e.clientX - offsetX) + "px";
        win.style.top = (e.clientY - offsetY) + "px";
    }
}

document.onmouseup = ()=> drag = false;

</script>

</body>
</html>
