<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudCore OS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background:
                radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 800px;

            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;

            padding: 40px;

            text-align: center;

            box-shadow:
                0 0 30px rgba(0,0,0,0.4),
                0 0 80px rgba(59,130,246,0.15);
        }

        .logo-text {
            font-family: "Pacifico", cursive;
            font-size: 64px;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 15px;
            font-size: 32px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #dbeafe;
        }

        .cloudcore-logo {
            width: 256px;
            max-width: 80%;
            height: auto;

            transition: transform 0.3s ease;
        }

        .cloudcore-logo:hover {
            transform: scale(1.05);
        }

        .footer {
            margin-top: 25px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">

        <h1 class="logo-text">CloudCore OS</h1>

        <h2>Welcome to CloudCore OS</h2>

        <p>
            CloudCore will help you organize your things better.
        </p>

        <a href="https://postimg.cc/LYX21zNC" target="_blank">
            <img
                class="cloudcore-logo"
                src="https://i.postimg.cc/LYX21zNC/Cloud-Core.png"
                alt="CloudCore OS Logo">
        </a>

        <div class="footer">
            CloudCore OS • Modern Cloud Experience
        </div>

    </div>

</body>
</html>
