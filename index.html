<!DOCTYPE html>
<html>
<head>
<title>CloudCore OS</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* top bar */
.topbar{
    height:40px;
    background:black;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
}

/* desktop */
.desktop{
    padding:60px 10px;
    display:flex;
    gap:10px;
}

/* icon */
.icon{
    width:80px;
    text-align:center;
    cursor:pointer;
}

.icon img{
    width:60px;
    height:60px;
}

/* window */
.window{
    display:none;
    position:absolute;
    top:100px;
    left:100px;
    width:300px;
    background:#1e293b;
    border:1px solid white;
    padding:10px;
}

/* close button */
.close{
    background:red;
    color:white;
    border:none;
    padding:5px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div>CloudCore OS</div>
    <div id="clock"></div>
</div>

<!-- DESKTOP -->
<div class="desktop">

    <div class="icon" onclick="openApp('journal')">
        <img src="https://i.postimg.cc/LYX21zNC/Cloud-Core.png">
        <p>Journal</p>
    </div>

    <div class="icon" onclick="openApp('notes')">
        <img src="https://i.postimg.cc/LYX21zNC/Cloud-Core.png">
        <p>Notes</p>
    </div>

</div>

<!-- JOURNAL -->
<div class="window" id="journal">

    <h3>Journal</h3>

    <button class="close" onclick="closeApp('journal')">
        close
    </button>

    <p>Hello this is journal</p>

</div>

<!-- NOTES -->
<div class="window" id="notes">

    <h3>Notes</h3>

    <button class="close" onclick="closeApp('notes')">
        close
    </button>

    <p>Write notes here</p>

</div>

<script>

/* clock */
function updateClock(){

    let now = new Date();

    document.getElementById("clock").innerText =
        now.toLocaleTimeString();

}

setInterval(updateClock,1000);
updateClock();

/* open app */
function openApp(id){
    document.getElementById(id).style.display = "block";
}

/* close app */
function closeApp(id){
    document.getElementById(id).style.display = "none";
}

</script>

</body>
</html>
