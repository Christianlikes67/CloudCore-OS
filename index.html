<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudCore OS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:white;

    background:
    radial-gradient(circle at top,#2563eb 0%,#0f172a 45%,#020617 100%);
}

/* TOP BAR */

.topbar{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:42px;

    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(12px);

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 15px;

    border-bottom:1px solid rgba(255,255,255,0.1);

    z-index:1000;
}

.os-name{
    font-family:"Pacifico",cursive;
    font-size:24px;
}

.clock{
    color:#cbd5e1;
}

/* DESKTOP */

.desktop{
    padding-top:70px;
    padding-left:20px;
}

/* ICON */

.icon{
    width:90px;
    text-align:center;
    cursor:pointer;
    user-select:none;
}

.icon img{
    width:64px;
    height:64px;
    border-radius:15px;
    transition:0.2s;
}

.icon img:hover{
    transform:scale(1.08);
}

.icon p{
    margin-top:8px;
    font-size:14px;
}

/* WINDOW */

.window{
    width:800px;
    max-width:90%;

    position:absolute;
    top:110px;
    left:50%;
    transform:translateX(-50%);

    background:rgba(15,23,42,0.88);
    backdrop-filter:blur(15px);

    border-radius:20px;

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 0 30px rgba(0,0,0,0.4),
    0 0 80px rgba(59,130,246,0.15);
}

.window-header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:15px 20px;

    border-bottom:1px solid rgba(255,255,255,0.1);
}

.close-btn{
    width:30px;
    height:30px;

    border:none;
    border-radius:50%;

    background:#ef4444;
    color:white;

    cursor:pointer;
}

.window-content{
    padding:35px;
    text-align:center;
}

.logo-text{
    font-family:"Pacifico",cursive;
    font-size:64px;
    margin-bottom:20px;
}

.cloudcore-logo{
    width:260px;
    max-width:80%;
    height:auto;

    transition:0.3s;
}

.cloudcore-logo:hover{
    transform:scale(1.05);
}

.subtitle{
    font-size:32px;
    margin-top:20px;
    margin-bottom:15px;
}

.description{
    color:#dbeafe;
    font-size:18px;
    line-height:1.6;
}

.footer{
    margin-top:30px;
    color:#94a3b8;
    font-size:14px;
}

/* HIDDEN */

.hidden{
    display:none;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="os-name">
        CloudCore OS
    </div>

    <div class="clock" id="clock">
        Loading...
    </div>

</div>

<!-- DESKTOP -->

<div class="desktop">

    <div class="icon" onclick="openWindow()">

        <img
            src="https://i.postimg.cc/LYX21zNC/Cloud-Core.png"
            alt="CloudCore">

        <p>CloudCore</p>

    </div>

</div>

<!-- MAIN WINDOW -->

<div class="window" id="mainWindow">

    <div class="window-header">

        <h3>CloudCore OS</h3>

        <button
            class="close-btn"
            onclick="closeWindow()">
            ×
        </button>

    </div>

    <div class="window-content">

        <h1 class="logo-text">
            CloudCore OS
        </h1>

        <img
            class="cloudcore-logo"
            src="https://i.postimg.cc/LYX21zNC/Cloud-Core.png"
            alt="CloudCore Logo">

        <h2 class="subtitle">
            Welcome to CloudCore OS
        </h2>

        <p class="description">
            CloudCore will help you organize your things better.
            This is the beginning of your custom web operating system.
        </p>

        <div class="footer">
            CloudCore OS • WebOS Part 2 Edition
        </div>

    </div>

</div>

<script>

/* CLOCK */

function updateClock(){

    const now = new Date();

    document.getElementById("clock").textContent =
        now.toLocaleDateString() + " " +
        now.toLocaleTimeString();

}

updateClock();
setInterval(updateClock,1000);

/* WINDOW */

function closeWindow(){
    document
        .getElementById("mainWindow")
        .classList.add("hidden");
}

function openWindow(){
    document
        .getElementById("mainWindow")
        .classList.remove("hidden");
}

</script>

</body>
</html>
