<!DOCTYPE html>
<html lang="da">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CloudCore OS</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;
    overflow:hidden;

    font-family:Arial,sans-serif;

    background-image:
    url(
    "https://i.postimg.cc/3yLzJyKr/Cloud-Core-1-1.jpg"
    );

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

}

/* BOOT SCREEN */

#bootScreen{

    position:fixed;
    inset:0;

    z-index:999999;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:black;

}

#bootImage{

    position:absolute;

    width:100%;
    height:100%;

    object-fit:cover;

}

#bootOverlay{

    position:absolute;
    inset:0;

    background:
    rgba(0,0,0,0.25);

}

#bootText{

    position:relative;

    z-index:2;

    color:white;

    font-size:64px;
    font-weight:bold;

    text-align:center;

    text-shadow:
    0 0 20px white,
    0 0 40px white;

}

.fadeOut{

    animation:
    bootFade 1.5s forwards;

}

@keyframes bootFade{

    to{

        opacity:0;
        visibility:hidden;

    }

}

/* TOPBAR */

.topbar{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:12px 18px;

    color:white;

    z-index:9999;

    background:
    rgba(0,0,0,0.25);

    backdrop-filter:
    blur(12px);

}

.logo{

    font-family:
    "Pacifico",
    cursive;

    font-size:28px;

}

.clock{

    background:
    rgba(255,255,255,0.15);

    padding:8px 15px;

    border-radius:999px;

}

/* DESKTOP */

.desktop{

    padding-top:90px;
    padding-left:25px;

    display:flex;
    flex-direction:column;

    gap:20px;

}

/* BIG ICONS */

.icon{

    width:140px;

    text-align:center;

    color:white;

    cursor:pointer;

    user-select:none;

}

.icon img{

    width:100px;
    height:100px;

    display:block;

    margin:auto;

    filter:
    drop-shadow(
    0 0 12px rgba(0,0,0,0.6)
    );

}

.icon p{

    margin-top:10px;

    font-size:16px;
    font-weight:bold;

    text-shadow:
    0 0 10px black,
    0 0 20px black;

}

/* WINDOWS */

.window{

    position:absolute;

    width:700px;

    background:
    rgba(255,255,255,0.92);

    backdrop-filter:
    blur(15px);

    border-radius:16px;

    display:none;

    overflow:hidden;

    box-shadow:
    0 10px 35px
    rgba(0,0,0,0.3);

}

.window-header{

    padding:12px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    cursor:move;

    background:
    rgba(0,0,0,0.08);

}

.window-title{

    font-weight:bold;

}

.close{

    width:18px;
    height:18px;

    border:none;

    border-radius:50%;

    background:#ff5f57;

    cursor:pointer;

}

.window-content{

    padding:20px;

}
/* NOTES */

#notesArea{

    width:100%;
    height:320px;

    resize:none;

    border:none;
    outline:none;

    padding:15px;

    border-radius:12px;

    background:#f5f5f5;

    font-size:16px;

}

/* BROWSER */

.browser-bar{

    display:flex;
    gap:10px;

    margin-bottom:10px;

}

.browser-bar input{

    flex:1;

    padding:10px;

}

.browser-bar button{

    padding:10px 16px;

}

#browserFrame{

    width:100%;
    height:450px;

    border:none;

    border-radius:10px;

}

/* SETTINGS */

.wallpaper-grid{

    display:flex;
    gap:12px;

    flex-wrap:wrap;

}

.wallpaper{

    width:160px;

    cursor:pointer;

}

.wallpaper img{

    width:100%;

    border-radius:12px;

}

/* STORE */

.app-card{

    padding:12px;

    background:#f2f2f2;

    border-radius:12px;

    margin-bottom:12px;

}

.app-card button{

    margin-top:10px;

    padding:8px 12px;

}

</style>

</head>

<body>

<!-- BOOT SCREEN -->

<div id="bootScreen">

    <img
    id="bootImage"
    src="https://i.postimg.cc/3yLzJyKr/Cloud-Core-1-1.jpg">

    <div id="bootOverlay"></div>

    <div id="bootText">

        Welcome to
        <br>
        CloudCore OS

    </div>

</div>

<!-- TOPBAR -->

<div class="topbar">

    <div class="logo">

        CloudCore OS

    </div>

    <div
    class="clock"
    id="clock">

        Loading...

    </div>

</div>

<!-- DESKTOP -->

<div
class="desktop"
id="desktop">

    <!-- Browser -->

    <div
    class="icon"
    onclick="openWindow('browser')">

        <img
        src="https://cdn-icons-png.flaticon.com/512/888/888879.png">

        <p>

            Browser

        </p>

    </div>

    <!-- Notes -->

    <div
    class="icon"
    onclick="openWindow('notes')">

        <img
        src="https://cdn-icons-png.flaticon.com/512/942/942748.png">

        <p>

            Notes

        </p>

    </div>

    <!-- Settings -->

    <div
    class="icon"
    onclick="openWindow('settings')">

        <img
        src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">

        <p>

            Settings

        </p>

    </div>

    <!-- Store -->

    <div
    class="icon"
    onclick="openWindow('store')">

        <img
        src="https://cdn-icons-png.flaticon.com/512/3081/3081986.png">

        <p>

            Store

        </p>

    </div>

</div>

<!-- BROWSER WINDOW -->

<div
class="window"
id="browser"

style="
top:120px;
left:220px;
">

    <div
    class="window-header">

        <span
        class="window-title">

            CloudCore Browser

        </span>

        <button
        class="close"

        onclick="
        closeWindow(
        'browser'
        )">
        </button>

    </div>

    <div
    class="window-content">

        <div
        class="browser-bar">

            <input

            id="browserInput"

            placeholder="Søg på Google">

            <button

            onclick="
            searchBrowser()
            ">

                Go

            </button>

        </div>

        <iframe

        id="browserFrame"

        src="about:blank">

        </iframe>

    </div>

</div>
<!-- NOTES WINDOW -->

<div
class="window"
id="notes"

style="
top:170px;
left:280px;
">

    <div
    class="window-header">

        <span
        class="window-title">

            Notes

        </span>

        <button
        class="close"

        onclick="
        closeWindow(
        'notes'
        )">
        </button>

    </div>

    <div
    class="window-content">

        <h2>

            Mine Noter

        </h2>

        <br>

        <textarea

        id="notesArea"

        placeholder=
        "Skriv noget...">

        </textarea>

    </div>

</div>

<!-- SETTINGS WINDOW -->

<div
class="window"
id="settings"

style="
top:220px;
left:340px;
">

    <div
    class="window-header">

        <span
        class="window-title">

            Settings

        </span>

        <button
        class="close"

        onclick="
        closeWindow(
        'settings'
        )">
        </button>

    </div>

    <div
    class="window-content">

        <h2>

            Wallpapers

        </h2>

        <br>

        <div
        class="wallpaper-grid">

            <!-- CloudCore -->

            <div
            class="wallpaper"

            onclick="
            setWallpaper(
            'https://i.postimg.cc/3yLzJyKr/Cloud-Core-1-1.jpg'
            )">

                <img

                src="https://i.postimg.cc/3yLzJyKr/Cloud-Core-1-1.jpg">

                <p>

                    CloudCore OS

                </p>

            </div>

            <!-- Dark -->

            <div
            class="wallpaper"

            onclick="
            setWallpaper(
            'https://images.unsplash.com/photo-1503264116251-35a269479413?q=80&w=1600'
            )">

                <img

                src="https://images.unsplash.com/photo-1503264116251-35a269479413?q=80&w=400">

                <p>

                    Dark

                </p>

            </div>

            <!-- Nature -->

            <div
            class="wallpaper"

            onclick="
            setWallpaper(
            'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600'
            )">

                <img

                src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=400">

                <p>

                    Nature

                </p>

            </div>

        </div>

        <br>

        <h3>

            Upload eget billede

        </h3>

        <br>

        <input

        type="file"

        id="wallpaperUpload"

        accept="image/*">

    </div>

</div>

<!-- STORE WINDOW -->

<div
class="window"
id="store"

style="
top:260px;
left:400px;
width:500px;
">

    <div
    class="window-header">

        <span
        class="window-title">

            CloudCore Store

        </span>

        <button
        class="close"

        onclick="
        closeWindow(
        'store'
        )">
        </button>

    </div>

    <div
    class="window-content">

        <div
        class="app-card">

            <h3>

                Calculator

            </h3>

            <p>

                Simpel lommeregner

            </p>

            <button

            onclick="
            installCalculator()
            ">

                Install

            </button>

        </div>

        <div
        class="app-card">

            <h3>

                Journal

            </h3>

            <p>

                Personlig dagbog

            </p>

            <button

            onclick="
            installJournal()
            ">

                Install

            </button>

        </div>

    </div>

</div>

<script>

/* CLOCK */

function updateClock(){

    let now =
    new Date();

    document
    .getElementById(
    "clock"
    )
    .innerText =

    now.toLocaleDateString()

    + " " +

    now.toLocaleTimeString();

}

setInterval(
updateClock,
1000
);

updateClock();

/* WINDOW SYSTEM */

let biggest = 1;

function openWindow(id){

    let win =
    document
    .getElementById(id);

    win.style.display =
    "block";

    biggest++;

    win.style.zIndex =
    biggest;

}

function closeWindow(id){

    document
    .getElementById(id)
    .style.display =
    "none";

}
/* DRAGGING */

let currentWindow = null;

let offsetX = 0;
let offsetY = 0;

document
.querySelectorAll(".window")
.forEach(function(win){

    let header =
    win.querySelector(
    ".window-header"
    );

    header.addEventListener(
    "mousedown",

    function(e){

        currentWindow =
        win;

        biggest++;

        win.style.zIndex =
        biggest;

        offsetX =
        e.clientX -
        win.offsetLeft;

        offsetY =
        e.clientY -
        win.offsetTop;

    });

});

document.addEventListener(

"mousemove",

function(e){

    if(currentWindow){

        currentWindow.style.left =

        (
        e.clientX -
        offsetX
        ) + "px";

        currentWindow.style.top =

        (
        e.clientY -
        offsetY
        ) + "px";

    }

});

document.addEventListener(

"mouseup",

function(){

    currentWindow =
    null;

});

/* NOTES SAVE */

const notesArea =

document
.getElementById(
"notesArea"
);

notesArea.value =

localStorage.getItem(
"cloudcore_notes"
)

|| "";

notesArea.addEventListener(

"input",

function(){

    localStorage.setItem(

    "cloudcore_notes",

    notesArea.value

    );

});

/* WALLPAPER SYSTEM */

function setWallpaper(url){

    document.body
    .style.backgroundImage =

    "url('" +
    url +
    "')";

    localStorage.setItem(

    "cloudcore_wallpaper",

    url

    );

}

let savedWallpaper =

localStorage.getItem(

"cloudcore_wallpaper"

);

if(savedWallpaper){

    document.body
    .style.backgroundImage =

    "url('" +
    savedWallpaper +
    "')";

}

/* CUSTOM WALLPAPER */

const upload =

document
.getElementById(

"wallpaperUpload"

);

upload.addEventListener(

"change",

function(e){

    let file =
    e.target.files[0];

    if(!file) return;

    let reader =
    new FileReader();

    reader.onload =

    function(event){

        setWallpaper(

        event.target.result

        );

    };

    reader.readAsDataURL(
    file
    );

});

/* BROWSER */

function searchBrowser(){

    let text =

    document
    .getElementById(
    "browserInput"
    )
    .value
    .trim();

    if(text === "")
    return;

    window.open(

    "https://www.google.com/search?q="

    +

    encodeURIComponent(
    text
    ),

    "_blank"

    );

}

/* INSTALL CALCULATOR */

function installCalculator(){

    if(

    document
    .getElementById(
    "calculatorIcon"
    )

    ){

        alert(
        "Calculator already installed."
        );

        return;

    }

    let icon =

    document
    .createElement("div");

    icon.className =
    "icon";

    icon.id =
    "calculatorIcon";

    icon.innerHTML =

    `

    <img
    src="https://cdn-icons-png.flaticon.com/512/2920/2920277.png">

    <p>

        Calculator

    </p>

    `;

    icon.onclick =
    function(){

        let equation =

        prompt(

        "Type a calculation"

        );

        if(!equation)
        return;

        try{

            alert(
            eval(
            equation
            )
            );

        }

        catch{

            alert(
            "Invalid calculation"
            );

        }

    };

    document
    .getElementById(
    "desktop"
    )
    .appendChild(icon);

    alert(
    "Calculator installed"
    );

}

/* INSTALL JOURNAL */

function installJournal(){

    if(

    document
    .getElementById(
    "journalIcon"
    )

    ){

        alert(
        "Journal already installed."
        );

        return;

    }

    let icon =

    document
    .createElement("div");

    icon.className =
    "icon";

    icon.id =
    "journalIcon";

    icon.innerHTML =

    `

    <img
    src="https://cdn-icons-png.flaticon.com/512/2541/2541988.png">

    <p>

        Journal

    </p>

    `;

    icon.onclick =

    function(){

        let entry =

        prompt(

        "Journal entry"

        );

        if(entry){

            localStorage
            .setItem(

            "journal_entry",

            entry

            );

            alert(
            "Saved"
            );

        }

    };

    document
    .getElementById(
    "desktop"
    )
    .appendChild(icon);

    alert(
    "Journal installed"
    );

}

/* BOOT SCREEN */

setTimeout(

function(){

    document
    .getElementById(
    "bootScreen"
    )
    .classList
    .add(
    "fadeOut"
    );

},

2500

);

</script>

</body>
</html>
