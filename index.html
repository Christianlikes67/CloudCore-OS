<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudCore OS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        body {
            background-image: url("https://i.postimg.cc/LYX21zNC/Cloud-Core.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            color: white;
            text-align: center;
            font-family: Arial, sans-serif;

            margin: 0;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid white;
            border-radius: 15px;
            padding: 30px;
            max-width: 700px;
            width: 90%;

            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-family: "Pacifico", cursive;
            font-size: 60px;
            margin: 0 0 20px 0;
        }

        h2 {
            margin-top: 0;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .cloudcore-image {
            width: 256px;
            height: auto;
            margin-top: 20px;
            transition: transform 0.3s ease;
        }

        .cloudcore-image:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">

        <h1 class="logo">CloudCore OS</h1>

        <h2>Welcome to CloudCore OS</h2>

        <p>
            CloudCore will help you organize your things better.
        </p>

        <a href="https://postimg.cc/LYX21zNC" target="_blank">
            <img
                class="cloudcore-image"
                src="https://i.postimg.cc/LYX21zNC/Cloud-Core.png"
                alt="CloudCore OS Logo">
        </a>

    </div>

</body>
</html>
